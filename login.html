<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My Kanban Board</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for the login container to center it */
        body {
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        .login-container h2 { margin-bottom: 1.5rem; color: #333; }
        .login-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .login-container button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .login-container button:hover { background-color: #0056b3; }
        .toggle-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2 id="formTitle">Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="authBtn">Login</button>
        <p class="toggle-text" id="toggleMode">Don't have an account? Register</p>
        <p id="message" style="color: red; margin-top: 10px; font-size: 0.9rem;"></p>
    </div>

    <script>
        const authBtn = document.getElementById('authBtn');
        const toggleMode = document.getElementById('toggleMode');
        const formTitle = document.getElementById('formTitle');
        const message = document.getElementById('message');
        
        let isLogin = true;

        // Toggle between Login and Register view
        toggleMode.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.innerText = isLogin ? 'Login' : 'Register';
            authBtn.innerText = isLogin ? 'Login' : 'Register';
            toggleMode.innerText = isLogin ? "Don't have an account? Register" : "Already have an account? Login";
            message.innerText = '';
        });

        // Handle button click
        // Handle button click
        authBtn.addEventListener('click', async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/login' : '/register';
            
            try {
                const response = await fetch(`http://localhost:5000${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        // 🔐 NEW: Save BOTH the JWT token and username
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('username', data.username);
                        window.location.href = 'index.html';
                    } else {
                        // Switch to login mode FIRST
                        toggleMode.click();
                        
                        // THEN show the message
                        message.style.color = 'green';
                        message.innerText = 'Registered Successfully! Please Login.';
                    }
                } else {
                    message.style.color = 'red';
                    message.innerText = data.message || 'Error occurred';
                }
            } catch (error) {
                console.error(error);
                message.innerText = 'Server not connected.';
            }
        });
    </script>
</body>
</html>
